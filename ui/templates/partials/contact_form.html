{{ define "contact_form" }}
<div id="contact-form-container">
	<form hx-post="/api/contact/submit" hx-target="#contact-form-container" hx-swap="outerHTML" class="space-y-4">
		<div>
			<label for="name" class="block text-sm font-medium text-ink-muted mb-1">Name</label>
			<input type="text" name="name" id="name" required class="w-full px-4 py-2 border border-border rounded-md focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all bg-bg text-ink">
		</div>
		
		<div>
			<label for="contact_method" class="block text-sm font-medium text-ink-muted mb-1">Email or Phone</label>
			<input type="text" name="contact_method" id="contact_method" required class="w-full px-4 py-2 border border-border rounded-md focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all bg-bg text-ink">
		</div>
		
		<div>
			<label for="subject" class="block text-sm font-medium text-ink-muted mb-1">Subject</label>
			<select name="subject" id="subject" class="w-full px-4 py-2 border border-border rounded-md focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all bg-bg text-ink appearance-none">
				<option value="general">General Inquiry</option>
				<option value="product-inquiry">Product Inquiry</option>
				<option value="support">Support</option>
				<option value="partnership">Partnership</option>
			</select>
		</div>
		
		<div>
			<label for="message" class="block text-sm font-medium text-ink-muted mb-1">Message</label>
			<textarea name="message" id="message" rows="4" required class="w-full px-4 py-2 border border-border rounded-md focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all bg-bg text-ink resize-y"></textarea>
		</div>
		
		<button type="submit" class="w-full py-3 bg-primary text-white rounded-md font-medium hover:bg-primary-light hover:shadow-glow transition-all duration-300">
			Send Message
		</button>
	</form>
</div>
{{ end }}
